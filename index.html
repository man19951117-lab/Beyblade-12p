<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <title>Milo盃 BEYBLADE X 邀請賽</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff0055;
            --tertiary: #cc00ff;
            --quaternary: #ffaa00;
            --gold: #ffd700;
            --bg: #121212;
            --panel: #1e1e24;
            --text: #e0e0e0;
            --border: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100dvh;
        }

        /* 頂部導航列 (含全螢幕按鈕) */
        .top-bar {
            width: 100%; background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--border);
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .top-bar-title { font-weight: bold; color: #aaa; letter-spacing: 1px; font-size: 1.1rem;}

        .fullscreen-btn {
            background: rgba(0, 255, 204, 0.1); border: 1px solid var(--primary);
            color: var(--primary); padding: 6px 12px; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .fullscreen-btn:hover { background: var(--primary); color: #000; }

        /* 標題區 */
        .header { text-align: center; margin: 20px 0; padding: 0 10px;}
        h1 { 
            color: var(--gold); 
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 5px rgba(255, 215, 0, 0.8); 
            margin-bottom: 5px; margin-top: 0;
            font-size: clamp(2rem, 5vw, 3rem);
            letter-spacing: 2px; text-transform: uppercase;
        }
        .subtitle { color: #aaa; margin-top: 5px; font-size: 1.1rem; }

        /* 賽前設定面板 */
        #setup-panel {
            background: var(--panel); padding: 30px; border-radius: 15px;
            border: 1px solid var(--border); max-width: 600px; width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 20px;
        }
        #setup-panel h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px;}
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { color: #ccc; font-weight: bold; }
        textarea {
            background: #111; color: #fff; border: 1px solid #444; border-radius: 8px;
            padding: 15px; font-size: 1rem; resize: vertical; min-height: 150px;
            outline: none; line-height: 1.5;
        }
        textarea:focus { border-color: var(--primary); }
        select {
            background: #111; color: #fff; border: 1px solid #444; border-radius: 8px;
            padding: 10px; font-size: 1.1rem; outline: none;
        }
        .btn-generate {
            background: var(--primary); color: #000; border: none; border-radius: 8px;
            padding: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            transition: all 0.2s; margin-top: 10px;
        }
        .btn-generate:hover { background: #00cca3; transform: scale(0.98); }

        /* 賽事主體面板 */
        #tournament-panel {
            display: none; width: 100%; max-width: 1600px; padding: 20px;
        }
        
        .groups-container {
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
        }

        .card {
            background-color: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; flex: 1; min-width: 320px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .card h2 { margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .player-count-badge { font-size: 0.8rem; background: rgba(255,255,255,0.1); color: #ccc; padding: 3px 8px; border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; }
        th { font-weight: bold; }

        [contenteditable="true"] {
            cursor: text; transition: all 0.2s; background: rgba(255,255,255,0.03);
            border-radius: 4px; padding: 2px 4px; font-weight: bold;
        }
        [contenteditable="true"]:hover, [contenteditable="true"]:focus {
            background: rgba(255,255,255,0.1); outline: 1px solid #fff; color: #fff;
        }

        .match-list-title {
            color: #bbb; font-size: 0.9rem; margin: 15px 0 10px 0; display: block;
            border-bottom: 1px dashed #444; padding-bottom: 5px; text-align: center;
        }

        .match-row {
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.3); margin-bottom: 6px; padding: 5px;
            border-radius: 6px; border: 1px solid #2a2a2a; font-size: 0.9em;
        }
        .player-name { flex: 1; text-align: center; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .vs { margin: 0 10px; color: #777; font-size: 0.8em; }
        .score-box {
            display: inline-block; width: 35px; height: 30px; line-height: 30px;
            text-align: center; background: rgba(255,255,255,0.05);
            border: 1px solid #555; border-radius: 4px; color: var(--gold); font-weight: bold;
        }

        /* 淘汰賽區域 */
        .knockout-card { margin-top: 30px; width: 100%; }
        .knockout-card h2 { color: var(--gold); border-bottom-color: var(--gold); justify-content: center;}
        
        .bracket { display: grid; gap: 20px; margin-top: 20px; }
        .bracket-col { display: flex; flex-direction: column; gap: 15px; justify-content: space-around; }
        .bracket-col h3 { text-align: center; color: #aaa; margin: 0; font-size: 1rem; background: #222; padding: 8px; border-radius: 4px;}

        .matchup { background: rgba(0,0,0,0.4); border: 1px solid #444; border-radius: 8px; overflow: hidden; }
        .matchup-title { font-size: 0.8em; text-align: center; padding: 4px; background: #222; color: #888; border-bottom: 1px solid #444; }
        .matchup.gold { border-color: var(--gold); }
        .matchup.gold .matchup-title { background: rgba(255, 215, 0, 0.1); color: var(--gold); }
        .matchup.bronze { border-color: #cd7f32; }
        .matchup.bronze .matchup-title { background: rgba(205, 127, 50, 0.1); color: #cd7f32; }
        
        .m-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #333; }
        .m-row:last-child { border-bottom: none; }
        .m-name { flex: 1; font-size: 1rem; color: #fff;}
        .seed { font-size: 0.7em; background: #444; color: #aaa; padding: 3px 6px; border-radius: 4px; margin-right: 10px; }

        .btn-restart {
            margin: 40px auto; display: block; background: #333; color: #aaa; border: 1px solid #555;
            padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: 0.2s;
        }
        .btn-restart:hover { background: #555; color: #fff; }

    </style>
</head>
<body>

    <!-- 頂部導航 -->
    <div class="top-bar">
        <div class="top-bar-title">Milo Cup Tournament Manager</div>
        <button class="fullscreen-btn" onclick="toggleFullScreen()" id="fs-btn">🔲 全螢幕模式</button>
    </div>

    <div class="header">
        <h1>🏆 Milo盃 BEYBLADE X 邀請賽</h1>
        <p class="subtitle" id="main-subtitle">設定您的專屬賽事</p>
    </div>

    <!-- 賽前設定面板 -->
    <div id="setup-panel">
        <h2>⚙️ 賽事產生器設定</h2>
        
        <div class="input-group">
            <label>1. 參賽選手名單 (奇數偶數皆可，一行一人)</label>
            <textarea id="playerList" placeholder="選手A&#10;選手B&#10;選手C&#10;...貼上名單"></textarea>
        </div>

        <div class="input-group">
            <label>2. 預賽要分成幾組？</label>
            <select id="groupCount">
                <option value="2">分成 2 組 (自動生成 4強淘汰賽)</option>
                <option value="3" selected>分成 3 組 (自動生成 6強淘汰賽)</option>
                <option value="4">分成 4 組 (自動生成 8強淘汰賽)</option>
            </select>
        </div>

        <button class="btn-generate" onclick="generateTournament()">🚀 產生專屬賽程表</button>
    </div>

    <!-- 賽事主面板 -->
    <div id="tournament-panel">
        <div class="groups-container" id="groups-container">
            <!-- 小組賽表格會生在這裡 -->
        </div>

        <div class="card knockout-card">
            <h2>🏆 決賽階段 - 終極淘汰賽</h2>
            <p style="text-align:center; color:#aaa; font-size:0.9em; margin-top:-5px;">(請依據小組賽成績，將晉級選手填入下方種子欄位)</p>
            <div class="bracket" id="knockout-container">
                <!-- 淘汰賽樹狀圖會生在這裡 -->
            </div>
        </div>
        
        <button class="btn-restart" onclick="location.reload()">重新設定賽事 (刷新網頁)</button>
    </div>

    <script>
        // 全螢幕控制邏輯
        function toggleFullScreen() {
            const isIPhone = /iPhone/i.test(navigator.userAgent);
            if (!document.fullscreenElement) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {
                        if (isIPhone) alert("iPhone Safari 不支援全螢幕按鈕。\n請點擊『分享』➔『加入主畫面』，從桌面開啟即可享受滿版全螢幕！");
                    });
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (isIPhone) {
                    alert("iPhone Safari 不支援全螢幕按鈕。\n請點擊『分享』➔『加入主畫面』，從桌面開啟即可享受滿版全螢幕！");
                }
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', updateFsButton);
        document.addEventListener('webkitfullscreenchange', updateFsButton);
        function updateFsButton() {
            const btn = document.getElementById('fs-btn');
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                btn.innerHTML = '縮小畫面'; btn.style.background = 'var(--primary)'; btn.style.color = '#000';
            } else {
                btn.innerHTML = '🔲 全螢幕模式'; btn.style.background = 'rgba(0, 255, 204, 0.1)'; btn.style.color = 'var(--primary)';
            }
        }

        // 賽事生成邏輯
        const colors = [
            { main: 'var(--primary)', bg: 'rgba(0, 255, 204, 0.05)' },
            { main: 'var(--secondary)', bg: 'rgba(255, 0, 85, 0.05)' },
            { main: 'var(--tertiary)', bg: 'rgba(204, 0, 255, 0.05)' },
            { main: 'var(--quaternary)', bg: 'rgba(255, 170, 0, 0.05)' }
        ];
        const groupLabels = ['A', 'B', 'C', 'D'];

        function generateTournament() {
            const text = document.getElementById('playerList').value;
            // 清理空白列
            let players = text.split('\n').map(p => p.trim()).filter(p => p !== '');
            const numGroups = parseInt(document.getElementById('groupCount').value);

            if (players.length < numGroups * 2) {
                alert(`目前只有 ${players.length} 人，請至少輸入 ${numGroups * 2} 名選手才能分成 ${numGroups} 組喔！`);
                return;
            }

            // 隨機打亂名單 (洗牌)
            players.sort(() => Math.random() - 0.5);

            // 分配到各組 (完美支援奇數，像發牌一樣輪流)
            let groups = Array.from({length: numGroups}, () => []);
            players.forEach((p, index) => {
                groups[index % numGroups].push(p);
            });

            // 渲染小組賽
            let groupsHtml = '';
            groups.forEach((groupPlayers, gIndex) => {
                let gName = groupLabels[gIndex];
                let c = colors[gIndex];
                
                // 建立該組的對戰組合 (單循環)
                let matches = [];
                for (let i = 0; i < groupPlayers.length; i++) {
                    for (let j = i + 1; j < groupPlayers.length; j++) {
                        matches.push({ p1: groupPlayers[i], p2: groupPlayers[j] });
                    }
                }

                // 組合 HTML
                let tableRows = groupPlayers.map((p, i) => `
                    <tr>
                        <td>${gName}${i+1}</td>
                        <td contenteditable="true">${p}</td>
                        <td contenteditable="true">0</td>
                        <td contenteditable="true">0</td>
                        <td contenteditable="true">0</td>
                        <td contenteditable="true">-</td>
                    </tr>
                `).join('');

                let matchesHtml = matches.map(m => `
                    <div class="match-row">
                        <span class="player-name" contenteditable="true">${m.p1}</span>
                        <span class="score-box" contenteditable="true">0</span>
                        <span class="vs">vs</span>
                        <span class="score-box" contenteditable="true">0</span>
                        <span class="player-name" contenteditable="true">${m.p2}</span>
                    </div>
                `).join('');

                groupsHtml += `
                    <div class="card">
                        <h2 style="color:${c.main}; border-bottom-color:${c.main};">
                            ${gName}組 預賽 
                            <span class="player-count-badge">${groupPlayers.length}人</span>
                        </h2>
                        <table>
                            <tr><th style="background:${c.bg}; color:${c.main};">代號</th><th style="background:${c.bg}; color:${c.main};">選手</th><th style="background:${c.bg}; color:${c.main};">勝</th><th style="background:${c.bg}; color:${c.main};">敗</th><th style="background:${c.bg}; color:${c.main};">積分</th><th style="background:${c.bg}; color:${c.main};">名次</th></tr>
                            ${tableRows}
                        </table>
                        <strong class="match-list-title">⚔️ ${gName}組 單循環比分紀錄 (共${matches.length}場)</strong>
                        ${matchesHtml}
                    </div>
                `;
            });

            document.getElementById('groups-container').innerHTML = groupsHtml;

            // 渲染淘汰賽樹狀圖
            renderKnockout(numGroups);

            // 切換畫面
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('tournament-panel').style.display = 'block';
            document.getElementById('main-subtitle').innerText = `共 ${players.length} 名選手 ｜ 隨機分為 ${numGroups} 組對戰`;
        }

        function renderKnockout(numGroups) {
            let container = document.getElementById('knockout-container');
            let html = '';

            const finalsHtml = `
                <div class="bracket-col">
                    <h3 style="color:var(--gold);">Finals (決賽)</h3>
                    <div class="matchup gold">
                        <div class="matchup-title">🥇 Milo盃 冠軍戰</div>
                        <div class="m-row"><span class="m-name" contenteditable="true">晉級者 1</span><span class="score-box" contenteditable="true">0</span></div>
                        <div class="m-row"><span class="m-name" contenteditable="true">晉級者 2</span><span class="score-box" contenteditable="true">0</span></div>
                    </div>
                    <div class="matchup bronze" style="margin-top:10px;">
                        <div class="matchup-title">🥉 季軍戰</div>
                        <div class="m-row"><span class="m-name" contenteditable="true">敗者 1</span><span class="score-box" contenteditable="true">0</span></div>
                        <div class="m-row"><span class="m-name" contenteditable="true">敗者 2</span><span class="score-box" contenteditable="true">0</span></div>
                    </div>
                </div>
            `;

            if (numGroups === 2) {
                container.style.gridTemplateColumns = '1fr 1fr';
                html = `
                    <div class="bracket-col">
                        <h3>Semi-Finals (四強準決賽)</h3>
                        <div class="matchup">
                            <div class="matchup-title">準決賽 A</div>
                            <div class="m-row"><span class="seed">A組 #1</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">B組 #2</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                        <div class="matchup">
                            <div class="matchup-title">準決賽 B</div>
                            <div class="m-row"><span class="seed">B組 #1</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">A組 #2</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                    </div>
                    ${finalsHtml}
                `;
            } else if (numGroups === 3) {
                container.style.gridTemplateColumns = 'repeat(auto-fit, minmax(280px, 1fr))';
                html = `
                    <div class="bracket-col">
                        <h3>Round 1 (外卡戰)</h3>
                        <div class="matchup">
                            <div class="matchup-title">Match 1</div>
                            <div class="m-row"><span class="seed">#4</span><span class="m-name" contenteditable="true">第4種子</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">#5</span><span class="m-name" contenteditable="true">第5種子</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                        <div class="matchup">
                            <div class="matchup-title">Match 2</div>
                            <div class="m-row"><span class="seed">#3</span><span class="m-name" contenteditable="true">第3種子</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">#6</span><span class="m-name" contenteditable="true">第6種子</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                    </div>
                    <div class="bracket-col">
                        <h3>Semi-Finals (準決賽)</h3>
                        <div class="matchup">
                            <div class="matchup-title">準決賽 A</div>
                            <div class="m-row"><span class="seed">#1</span><span class="m-name" contenteditable="true">第1種子(保送)</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">勝</span><span class="m-name" contenteditable="true">Match 1 勝者</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                        <div class="matchup">
                            <div class="matchup-title">準決賽 B</div>
                            <div class="m-row"><span class="seed">#2</span><span class="m-name" contenteditable="true">第2種子(保送)</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">勝</span><span class="m-name" contenteditable="true">Match 2 勝者</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                    </div>
                    ${finalsHtml}
                `;
            } else if (numGroups === 4) {
                container.style.gridTemplateColumns = 'repeat(auto-fit, minmax(280px, 1fr))';
                html = `
                    <div class="bracket-col">
                        <h3>Quarter-Finals (八強賽)</h3>
                        <div class="matchup">
                            <div class="matchup-title">八強 A</div>
                            <div class="m-row"><span class="seed">A組 #1</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">B組 #2</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                        <div class="matchup">
                            <div class="matchup-title">八強 B</div>
                            <div class="m-row"><span class="seed">C組 #1</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">D組 #2</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                        <div class="matchup">
                            <div class="matchup-title">八強 C</div>
                            <div class="m-row"><span class="seed">B組 #1</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">A組 #2</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                        <div class="matchup">
                            <div class="matchup-title">八強 D</div>
                            <div class="m-row"><span class="seed">D組 #1</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">C組 #2</span><span class="m-name" contenteditable="true">點擊輸入</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                    </div>
                    <div class="bracket-col" style="justify-content: center;">
                        <h3>Semi-Finals (準決賽)</h3>
                        <div class="matchup">
                            <div class="matchup-title">準決賽 1</div>
                            <div class="m-row"><span class="seed">勝A</span><span class="m-name" contenteditable="true">八強A 勝者</span><span class="score-box" contenteditable="true">0</span></div>
                            <div class="m-row"><span class="seed">勝B</span><span class="m-name" contenteditable="true">八強B 勝者</span><span class="score-box" contenteditable="true">0</span></div>
                        </div>
                        <div class="matchup">
                            <div class="matchup-title">準決賽 2</div>
                            <div class="m-row"><span class="seed">勝C</span><span class="m-name" contenteditable="true">八強C 勝者</span><span class="score-box" contenteditable="true">0</span></div>
